  <text x="24" y="272" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#3fb950">✓ </tspan><tspan fill="#6e7681">482/1847 tokens  ·  $0.0019  ·  3.1s</tspan></text>
