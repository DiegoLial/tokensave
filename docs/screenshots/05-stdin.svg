  <!-- content -->
  <text x="24" y="52" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">$ </tspan><tspan fill="#79c0ff">cat src/api/auth.js | npx tokensave run \</tspan></text>
  <text x="24" y="72" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">    --papel "Security Auditor" \</tspan></text>
  <text x="24" y="92" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">    --tarefa "Revisar vulnerabilidades" \</tspan></text>
  <text x="24" y="112" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">    --mode revisar-codigo --yes</tspan></text>
  <text x="24" y="132" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#c9d1d9"></tspan></text>
  <text x="24" y="152" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#79c0ff">⚡ </tspan><tspan fill="#e6edf3" font-weight="700">revisar-codigo</tspan><tspan fill="#6e7681">  ·  claude-sonnet-4-6  ·  ~$0.0021</tspan></text>
  <text x="24" y="172" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">Security Auditor → Revisar vulnerabilidades</tspan></text>
  <text x="24" y="192" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">   482/1847 tokens (headroom, -74%)</tspan></text>
  <text x="24" y="212" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#c9d1d9"></tspan></text>
