<svg xmlns="http://www.w3.org/2000/svg" width="780" height="420" viewBox="0 0 780 420">
  <defs>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <!-- window -->
  <rect width="780" height="420" rx="10" fill="#0d1117"/>
  <!-- titlebar -->
  <rect width="780" height="36" rx="10" fill="url(#titlebar)"/>
  <rect y="26" width="780" height="10" fill="#161b22"/>
  <!-- traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- title -->
  <text x="390" y="23" text-anchor="middle" font-size="12" font-family="Consolas,Menlo,monospace" fill="#6e7681">tokensave config</text>
  <!-- content -->
  <text x="24" y="52" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">$ </tspan><tspan fill="#79c0ff">npx tokensave config</tspan></text>
  <text x="24" y="72" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#c9d1d9"></tspan></text>
  <text x="24" y="92" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#79c0ff">⚡ </tspan><tspan fill="#e6edf3" font-weight="700">tokensave config</tspan></text>
  <text x="24" y="112" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#c9d1d9"></tspan></text>
  <text x="24" y="132" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">  Config atual:</tspan></text>
  <text x="24" y="152" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">  Modelo padrão:   </tspan><tspan fill="#79c0ff">claude-sonnet-4-6</tspan></text>
  <text x="24" y="172" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">  Caveman padrão:  </tspan><tspan fill="#79c0ff">full</tspan></text>
  <text x="24" y="192" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">  Anthropic key:   </tspan><tspan fill="#3fb950">✓ configurada</tspan></text>
  <text x="24" y="212" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">  OpenAI key:      </tspan><tspan fill="#f85149">✗ não configurada</tspan></text>
  <text x="24" y="232" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">  Google key:      </tspan><tspan fill="#f85149">✗ não configurada</tspan></text>
  <text x="24" y="252" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#c9d1d9"></tspan></text>
  <text x="24" y="272" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#3fb950">? </tspan><tspan fill="#e6edf3" font-weight="700">Anthropic API Key (Enter para manter): </tspan><tspan fill="#6e7681">****</tspan></text>
  <text x="24" y="292" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#3fb950">? </tspan><tspan fill="#e6edf3" font-weight="700">OpenAI API Key (Enter para manter): </tspan></text>
  <text x="24" y="312" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#3fb950">? </tspan><tspan fill="#e6edf3" font-weight="700">Modelo padrão: </tspan><tspan fill="#79c0ff">claude-sonnet-4-6</tspan></text>
  <text x="24" y="332" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#3fb950">? </tspan><tspan fill="#e6edf3" font-weight="700">Caveman level padrão: </tspan><tspan fill="#79c0ff">full</tspan></text>
  <text x="24" y="352" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#c9d1d9"></tspan></text>
  <text x="24" y="372" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#3fb950">  ✓ Config salva.</tspan></text>
