<svg xmlns="http://www.w3.org/2000/svg" width="780" height="400" viewBox="0 0 780 400">
  <defs>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <!-- window -->
  <rect width="780" height="400" rx="10" fill="#0d1117"/>
  <!-- titlebar -->
  <rect width="780" height="36" rx="10" fill="url(#titlebar)"/>
  <rect y="26" width="780" height="10" fill="#161b22"/>
  <!-- traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- title -->
  <text x="390" y="23" text-anchor="middle" font-size="12" font-family="Consolas,Menlo,monospace" fill="#6e7681">tokensave run --dry-run</text>
  <!-- content -->
  <text x="24" y="52" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">$ </tspan><tspan fill="#79c0ff">npx tokensave run \</tspan></text>
  <text x="24" y="72" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">    --papel "Engineer" --tarefa "Revisar auth" \</tspan></text>
  <text x="24" y="92" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">    --context-file ./src/auth.js --mode revisar-codigo --dry-run</tspan></text>
  <text x="24" y="112" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#c9d1d9"></tspan></text>
  <text x="24" y="132" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#79c0ff">⚡ </tspan><tspan fill="#e6edf3" font-weight="700">dry-run</tspan></text>
  <text x="24" y="152" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#c9d1d9"></tspan></text>
  <text x="24" y="172" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">  Tokens originais:  </tspan><tspan fill="#d29922">1204</tspan></text>
  <text x="24" y="192" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">  Após compressão:   </tspan><tspan fill="#3fb950">361</tspan><tspan fill="#6e7681"> (native, -70%)</tspan></text>
  <text x="24" y="212" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">  Custo estimado:    </tspan><tspan fill="#79c0ff">$0.0012</tspan></text>
  <text x="24" y="232" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#c9d1d9"></tspan></text>
  <text x="24" y="252" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">  Contexto comprimido:</tspan></text>
  <text x="24" y="272" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#c9d1d9"></tspan></text>
  <text x="24" y="292" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">  export async function login(req, res) {</tspan></text>
  <text x="24" y="312" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">    const user = await db.query(</tspan></text>
  <text x="24" y="332" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">      "SELECT * FROM users WHERE id=" + req.body.id)</tspan></text>
  <text x="24" y="352" font-size="13" font-family="Consolas,Menlo,monospace"><tspan fill="#6e7681">  ...</tspan></text>
</svg>